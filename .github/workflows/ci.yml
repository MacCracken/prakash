name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-features --all-targets -- -D warnings
      - run: cargo check --all-features
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit
  deny:
    name: Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
  test:
    name: Test (${{ matrix.os }})
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo test --doc
  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features
      - run: cargo test --all-features
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-llvm-cov
      - run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - name: Check coverage threshold (85%)
        run: |
          TOTAL=$(cargo llvm-cov --all-features --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'{d[\"data\"][0][\"totals\"][\"lines\"][\"percent\"]:.1f}')" 2>/dev/null || echo "0")
          echo "Coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 85" | bc -l 2>/dev/null || echo 1)" = "1" ]; then
            echo "::warning::Coverage ${TOTAL}% is below 85% target"
          fi
      - uses: codecov/codecov-action@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: lcov.info
          fail_ci_if_error: false
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features
  bench:
    name: Benchmark Regression
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks (PR)
        run: cargo bench --all-features -- --output-format bencher | tee pr-bench.txt
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch
      - name: Run benchmarks (main)
        run: |
          cd main-branch
          cargo bench --all-features -- --output-format bencher | tee ../main-bench.txt
      - name: Compare benchmarks
        run: |
          echo "## Benchmark Comparison (PR vs main)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if command -v python3 &>/dev/null; then
            python3 -c "
          import re, sys
          def parse(f):
              d = {}
              for line in open(f):
                  m = re.match(r'test (\S+)\s+.*bench:\s+([\d,]+) ns/iter', line)
                  if m:
                      d[m.group(1)] = int(m.group(2).replace(',',''))
              return d
          pr = parse('pr-bench.txt')
          main = parse('main-bench.txt')
          regressions = []
          for name in sorted(set(pr) & set(main)):
              p, m = pr[name], main[name]
              pct = (p - m) / m * 100 if m > 0 else 0
              marker = '🔴' if pct > 10 else '🟡' if pct > 5 else '🟢'
              print(f'{marker} {name}: {m}ns → {p}ns ({pct:+.1f}%)')
              if pct > 10:
                  regressions.append(f'{name}: {pct:+.1f}%')
          if regressions:
              print(f'::warning::Benchmark regressions >10%: {\", \".join(regressions)}')
          " >> $GITHUB_STEP_SUMMARY
          fi
  semver:
    name: SemVer Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-semver-checks
      - run: cargo semver-checks check-release
